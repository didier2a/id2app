<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="Porto Flow — Territoire et Usagers. Découvrez Porto-Vecchio à deux rythmes, ses enjeux saisonniers, ses flux, ses plages et la fonction territoriale de Porto Flow." />
  <meta name="theme-color" content="#0B1F33" />
  <title>Territoire — Porto Flow</title>
  <link rel="stylesheet" href="styles.css" />
  <style>
    /* ══ TERRITOIRE PAGE STYLES ══ */

    /* Hero photo */
    .territoire-hero {
      position: relative;
      min-height: 96vh;
      display: flex;
      align-items: center;
      overflow: hidden;
      background:
        linear-gradient(160deg, rgba(7,21,36,0.88) 0%, rgba(11,31,51,0.82) 40%, rgba(13,42,66,0.78) 70%, rgba(15,51,82,0.85) 100%),
        url('assets/images/porto-vecchio-hero.jpg') center center / cover no-repeat,
        linear-gradient(160deg, #071524 0%, #0B1F33 35%, #0d2a42 65%, #0f3352 100%);
      padding: 130px 0 90px;
    }

    .territoire-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 80% 60% at 72% 38%, rgba(31,111,139,0.28) 0%, transparent 60%),
        radial-gradient(ellipse 50% 40% at 18% 82%, rgba(216,111,60,0.14) 0%, transparent 50%),
        radial-gradient(ellipse 30% 30% at 50% 10%, rgba(143,199,218,0.06) 0%, transparent 50%);
      pointer-events: none;
    }

    .territoire-hero__topo {
      position: absolute;
      inset: 0;
      background-image:
        repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(143,199,218,0.035) 40px, rgba(143,199,218,0.035) 41px),
        repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(143,199,218,0.025) 40px, rgba(143,199,218,0.025) 41px);
      pointer-events: none;
    }

    .territoire-hero__glow {
      position: absolute;
      top: 15%;
      right: 3%;
      width: 560px;
      height: 560px;
      background: radial-gradient(circle, rgba(31,111,139,0.22) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 7s ease-in-out infinite;
      pointer-events: none;
    }

    .territoire-hero__glow2 {
      position: absolute;
      bottom: 10%;
      left: 5%;
      width: 300px;
      height: 300px;
      background: radial-gradient(circle, rgba(216,111,60,0.1) 0%, transparent 70%);
      border-radius: 50%;
      animation: pulseGlow 9s ease-in-out infinite reverse;
      pointer-events: none;
    }

    .territoire-hero__contour {
      position: absolute;
      right: -40px;
      top: 50%;
      transform: translateY(-50%);
      width: 540px;
      height: 540px;
      opacity: 0.08;
      pointer-events: none;
    }

    .territoire-hero__contour svg { width: 100%; height: 100%; }

    @keyframes pulseGlow {
      0%, 100% { opacity: 0.5; transform: scale(1); }
      50% { opacity: 1; transform: scale(1.1); }
    }

    .territoire-hero__inner {
      position: relative;
      z-index: 2;
      max-width: 780px;
    }

    .territoire-hero__badge {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: rgba(31,111,139,0.18);
      border: 1px solid rgba(143,199,218,0.28);
      border-radius: 100px;
      padding: 9px 20px;
      margin-bottom: 32px;
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.14em;
      text-transform: uppercase;
      color: #8FC7DA;
      backdrop-filter: blur(8px);
    }

    .badge-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      background: #D86F3C;
      box-shadow: 0 0 10px rgba(216,111,60,0.9);
      animation: blinkDot 2s ease-in-out infinite;
      flex-shrink: 0;
    }

    @keyframes blinkDot {
      0%, 100% { opacity: 1; }
      50% { opacity: 0.25; }
    }

    .territoire-hero__title {
      font-size: clamp(2.6rem, 5.5vw, 4.2rem);
      font-weight: 900;
      line-height: 1.08;
      color: #FAF6EC;
      margin-bottom: 26px;
      letter-spacing: -0.03em;
    }

    .territoire-hero__title em {
      font-style: normal;
      color: #8FC7DA;
      display: block;
    }

    .territoire-hero__subtitle {
      font-size: clamp(1rem, 2vw, 1.18rem);
      color: rgba(250,246,236,0.7);
      line-height: 1.8;
      max-width: 640px;
      margin-bottom: 52px;
    }

    .territoire-hero__stats {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 14px;
    }

    .stat-card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(143,199,218,0.14);
      border-radius: 16px;
      padding: 22px 14px;
      text-align: center;
      transition: all 0.35s ease;
      backdrop-filter: blur(10px);
      position: relative;
      overflow: hidden;
    }

    .stat-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 2px;
      background: linear-gradient(90deg, transparent, rgba(216,111,60,0.6), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .stat-card:hover {
      background: rgba(31,111,139,0.14);
      border-color: rgba(143,199,218,0.32);
      transform: translateY(-4px);
      box-shadow: 0 12px 32px rgba(0,0,0,0.3);
    }

    .stat-card:hover::before { opacity: 1; }

    .stat-card__number {
      display: block;
      font-size: clamp(1.5rem, 2.5vw, 2rem);
      font-weight: 900;
      color: #D86F3C;
      letter-spacing: -0.03em;
      line-height: 1;
      margin-bottom: 8px;
    }

    .stat-card__label {
      display: block;
      font-size: 0.7rem;
      color: rgba(250,246,236,0.5);
      text-transform: uppercase;
      letter-spacing: 0.09em;
      line-height: 1.4;
    }

    .territoire-hero__scroll {
      position: absolute;
      bottom: 38px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      color: rgba(143,199,218,0.45);
      font-size: 0.68rem;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      z-index: 2;
      animation: bounceScroll 2.8s ease-in-out infinite;
    }

    @keyframes bounceScroll {
      0%, 100% { transform: translateX(-50%) translateY(0); }
      50% { transform: translateX(-50%) translateY(8px); }
    }

    /* ══ GALERIE TERRITOIRE ══ */
    .galerie-territoire {
      padding: 90px 0;
      background: #0B1F33;
      position: relative;
      overflow: hidden;
    }

    .galerie-territoire::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(31,111,139,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .galerie-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 16px;
      margin-top: 48px;
    }

    .galerie-item {
      position: relative;
      border-radius: 16px;
      overflow: hidden;
      aspect-ratio: 4/3;
      cursor: pointer;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .galerie-item:hover {
      transform: scale(1.02);
      box-shadow: 0 20px 60px rgba(0,0,0,0.5);
    }

    .galerie-item--large {
      grid-column: span 2;
      aspect-ratio: 16/9;
    }

    .galerie-item__img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .galerie-item:hover .galerie-item__img {
      transform: scale(1.06);
    }

    .galerie-item__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11,31,51,0.85) 0%, rgba(11,31,51,0.2) 50%, transparent 100%);
      transition: opacity 0.35s ease;
    }

    .galerie-item__caption {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 20px 18px 16px;
      z-index: 2;
    }

    .galerie-item__tag {
      display: inline-block;
      font-size: 0.62rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #D86F3C;
      background: rgba(216,111,60,0.15);
      border: 1px solid rgba(216,111,60,0.3);
      padding: 3px 10px;
      border-radius: 100px;
      margin-bottom: 6px;
    }

    .galerie-item__title {
      font-size: 0.88rem;
      font-weight: 700;
      color: #FAF6EC;
      line-height: 1.3;
      margin: 0;
    }

    /* Fallback backgrounds pour galerie */
    .galerie-item--palombaggia {
      background: linear-gradient(135deg, #1a4a6e 0%, #0d6e8a 50%, #1a8fa0 100%);
    }
    .galerie-item--port {
      background: linear-gradient(135deg, #0B1F33 0%, #1F6F8B 60%, #2a8aaa 100%);
    }
    .galerie-item--cote {
      background: linear-gradient(135deg, #0d3a5a 0%, #1a6a8a 50%, #8FC7DA 100%);
    }
    .galerie-item--maquis {
      background: linear-gradient(135deg, #1a3a1a 0%, #2a5a2a 50%, #3a7a3a 100%);
    }
    .galerie-item--route {
      background: linear-gradient(135deg, #2a1a0a 0%, #4a3a1a 50%, #6a5a2a 100%);
    }
    .galerie-item--santa-giulia {
      background: linear-gradient(135deg, #0a2a4a 0%, #1a5a7a 50%, #2a8aaa 100%);
    }

    /* ══ DEUX RYTHMES ══ */
    .deux-rythmes {
      padding: 110px 0;
      background: #F5F0E8;
      position: relative;
      overflow: hidden;
    }

    .deux-rythmes::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1F6F8B 0%, #D86F3C 50%, #1F6F8B 100%);
    }

    .deux-rythmes::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(11,31,51,0.1), transparent);
    }

    .rythmes-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 28px;
      margin-top: 60px;
      margin-bottom: 40px;
    }

    .rythme-card {
      border-radius: 22px;
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .rythme-card:hover { transform: translateY(-5px); }

    .rythme-card--calme {
      background: linear-gradient(150deg, #1a3a52 0%, #0d2a42 100%);
      border: 1px solid rgba(143,199,218,0.18);
      box-shadow: 0 8px 40px rgba(11,31,51,0.28);
    }

    .rythme-card--calme:hover { box-shadow: 0 20px 64px rgba(11,31,51,0.4); }

    .rythme-card--intense {
      background: linear-gradient(150deg, #2d1a0a 0%, #1a0f06 100%);
      border: 1px solid rgba(216,111,60,0.22);
      box-shadow: 0 8px 40px rgba(216,111,60,0.12);
    }

    .rythme-card--intense:hover { box-shadow: 0 20px 64px rgba(216,111,60,0.22); }

    /* Photo band dans les rythme cards */
    .rythme-card__photo {
      width: 100%;
      height: 160px;
      overflow: hidden;
      position: relative;
    }

    .rythme-card__photo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .rythme-card:hover .rythme-card__photo img {
      transform: scale(1.05);
    }

    .rythme-card__photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to bottom, transparent 40%, rgba(11,31,51,0.9) 100%);
    }

    .rythme-card--intense .rythme-card__photo-overlay {
      background: linear-gradient(to bottom, transparent 40%, rgba(26,15,6,0.9) 100%);
    }

    .rythme-card__header {
      display: flex;
      align-items: flex-start;
      gap: 16px;
      padding: 30px 30px 22px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
    }

    .rythme-card__icon {
      flex-shrink: 0;
      width: 54px;
      height: 54px;
      border-radius: 13px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .rythme-card--calme .rythme-card__icon {
      background: rgba(143,199,218,0.1);
      border: 1px solid rgba(143,199,218,0.2);
    }

    .rythme-card--intense .rythme-card__icon {
      background: rgba(216,111,60,0.1);
      border: 1px solid rgba(216,111,60,0.2);
    }

    .rythme-card__season { flex: 1; }

    .season-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      padding: 4px 13px;
      border-radius: 100px;
      margin-bottom: 9px;
    }

    .season-tag--calme {
      background: rgba(143,199,218,0.14);
      color: #8FC7DA;
      border: 1px solid rgba(143,199,218,0.25);
    }

    .season-tag--intense {
      background: rgba(216,111,60,0.14);
      color: #D86F3C;
      border: 1px solid rgba(216,111,60,0.25);
    }

    .rythme-card__header h3 {
      font-size: 1.22rem;
      font-weight: 800;
      color: #FAF6EC;
      margin: 0;
    }

    .rythme-card__body { padding: 26px 30px; }

    .rythme-card__body > p {
      font-size: 0.9rem;
      color: rgba(250,246,236,0.62);
      line-height: 1.75;
      margin-bottom: 22px;
    }

    .rythme-card__list {
      list-style: none;
      padding: 0;
      margin: 0;
      display: flex;
      flex-direction: column;
      gap: 11px;
    }

    .rythme-card__list li {
      display: flex;
      align-items: flex-start;
      gap: 10px;
      font-size: 0.87rem;
      color: rgba(250,246,236,0.68);
      line-height: 1.55;
    }

    .list-icon {
      flex-shrink: 0;
      color: #8FC7DA;
      margin-top: 2px;
      font-size: 1rem;
      line-height: 1;
    }

    .list-icon--alert { color: #D86F3C; }

    .rythme-card__footer { padding: 20px 30px 30px; }

    .rythme-indicator { display: flex; flex-direction: column; gap: 8px; }

    .indicator-bar {
      display: block;
      height: 6px;
      border-radius: 100px;
      background: rgba(255,255,255,0.07);
      position: relative;
      overflow: hidden;
    }

    .indicator-bar::after {
      content: '';
      position: absolute;
      left: 0; top: 0;
      height: 100%;
      width: var(--level, 50%);
      border-radius: 100px;
      transition: width 1.8s ease;
    }

    .rythme-indicator--low .indicator-bar::after {
      background: linear-gradient(90deg, #8FC7DA, #1F6F8B);
    }

    .rythme-indicator--high .indicator-bar::after {
      background: linear-gradient(90deg, #D86F3C, #c0522a);
      box-shadow: 0 0 14px rgba(216,111,60,0.55);
    }

    .indicator-label {
      font-size: 0.7rem;
      text-transform: uppercase;
      letter-spacing: 0.09em;
      color: rgba(250,246,236,0.38);
    }

    /* Saison comparison bar */
    .saison-compare {
      margin-top: 48px;
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      border: 1px solid rgba(11,31,51,0.08);
      box-shadow: 0 4px 24px rgba(11,31,51,0.06);
    }

    .saison-compare__title {
      font-size: 0.8rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #2C4A5A;
      margin-bottom: 24px;
      text-align: center;
    }

    .saison-compare__bars {
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    .compare-row {
      display: grid;
      grid-template-columns: 140px 1fr 60px;
      gap: 16px;
      align-items: center;
    }

    .compare-row__label {
      font-size: 0.82rem;
      color: #2C4A5A;
      font-weight: 600;
    }

    .compare-row__track {
      height: 8px;
      background: rgba(11,31,51,0.06);
      border-radius: 100px;
      overflow: hidden;
      position: relative;
    }

    .compare-row__fill {
      height: 100%;
      border-radius: 100px;
      width: var(--w, 50%);
      transition: width 1.5s ease;
    }

    .compare-row__fill--low { background: linear-gradient(90deg, #8FC7DA, #1F6F8B); }
    .compare-row__fill--mid { background: linear-gradient(90deg, #F0C040, #D86F3C); }
    .compare-row__fill--high { background: linear-gradient(90deg, #D86F3C, #c0522a); box-shadow: 0 0 8px rgba(216,111,60,0.4); }

    .compare-row__value {
      font-size: 0.78rem;
      font-weight: 700;
      color: #0B1F33;
      text-align: right;
    }

    /* Bridge */
    .rythmes-bridge {
      display: flex;
      align-items: center;
      gap: 28px;
      padding: 34px 44px;
      background: linear-gradient(135deg, rgba(31,111,139,0.07), rgba(216,111,60,0.04));
      border: 1px solid rgba(31,111,139,0.18);
      border-radius: 18px;
      margin-top: 32px;
    }

    .bridge-line {
      flex: 1;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(31,111,139,0.35), transparent);
    }

    .bridge-content {
      display: flex;
      align-items: center;
      gap: 22px;
      flex-shrink: 0;
      max-width: 500px;
    }

    .bridge-icon { flex-shrink: 0; }

    .bridge-text {
      font-size: 0.97rem;
      color: #2C4A5A;
      line-height: 1.7;
      font-style: italic;
      font-weight: 500;
    }

    /* ══ REGARDS SUR LE TERRITOIRE ══ */
    .regards-territoire {
      padding: 100px 0;
      background: linear-gradient(160deg, #071524 0%, #0B1F33 50%, #0d2a42 100%);
      position: relative;
      overflow: hidden;
    }

    .regards-territoire::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 50% at 70% 40%, rgba(31,111,139,0.12) 0%, transparent 60%);
      pointer-events: none;
    }

    .regards-mosaic {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      grid-template-rows: auto auto;
      gap: 14px;
      margin-top: 52px;
    }

    .regard-item {
      position: relative;
      border-radius: 14px;
      overflow: hidden;
      transition: transform 0.35s ease, box-shadow 0.35s ease;
    }

    .regard-item:hover {
      transform: translateY(-4px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.5);
    }

    .regard-item--featured {
      grid-column: span 2;
      grid-row: span 2;
    }

    .regard-item__bg {
      width: 100%;
      height: 100%;
      min-height: 180px;
      object-fit: cover;
      display: block;
      transition: transform 0.5s ease;
    }

    .regard-item--featured .regard-item__bg {
      min-height: 380px;
    }

    .regard-item:hover .regard-item__bg {
      transform: scale(1.06);
    }

    .regard-item__overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(to top, rgba(11,31,51,0.9) 0%, rgba(11,31,51,0.3) 50%, transparent 100%);
    }

    .regard-item__info {
      position: absolute;
      bottom: 0;
      left: 0;
      right: 0;
      padding: 16px 14px 14px;
      z-index: 2;
    }

    .regard-item__cat {
      display: inline-block;
      font-size: 0.6rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #8FC7DA;
      margin-bottom: 4px;
    }

    .regard-item__name {
      font-size: 0.82rem;
      font-weight: 700;
      color: #FAF6EC;
      margin: 0;
      line-height: 1.3;
    }

    .regard-item--featured .regard-item__name {
      font-size: 1.1rem;
    }

    /* Fallback backgrounds */
    .regard-bg--port { background: linear-gradient(135deg, #0B1F33 0%, #1F6F8B 100%); }
    .regard-bg--plage { background: linear-gradient(135deg, #0d4a6e 0%, #1a8aaa 100%); }
    .regard-bg--maquis { background: linear-gradient(135deg, #1a3a1a 0%, #3a7a3a 100%); }
    .regard-bg--route { background: linear-gradient(135deg, #2a1a0a 0%, #6a5a2a 100%); }
    .regard-bg--ville { background: linear-gradient(135deg, #1a2a3a 0%, #2a4a6a 100%); }
    .regard-bg--cote { background: linear-gradient(135deg, #0a2a4a 0%, #2a8aaa 100%); }

    /* ══ FLUX TERRITOIRE ══ */
    .flux-territoire {
      padding: 110px 0;
      background: #0B1F33;
      position: relative;
      overflow: hidden;
    }

    .flux-territoire::before {
      content: '';
      position: absolute;
      inset: 0;
      background:
        radial-gradient(ellipse 60% 50% at 80% 50%, rgba(31,111,139,0.13) 0%, transparent 60%),
        radial-gradient(ellipse 40% 40% at 10% 80%, rgba(216,111,60,0.07) 0%, transparent 50%);
      pointer-events: none;
    }

    .flux-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 20px;
      margin-top: 60px;
    }

    .flux-card {
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(143,199,218,0.11);
      border-radius: 20px;
      padding: 28px 24px;
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .flux-card::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, var(--flux-color, #1F6F8B), transparent);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .flux-card:hover {
      background: rgba(31,111,139,0.08);
      border-color: rgba(143,199,218,0.24);
      transform: translateY(-5px);
      box-shadow: 0 16px 48px rgba(0,0,0,0.35);
    }

    .flux-card:hover::before { opacity: 1; }

    .flux-card--routes { --flux-color: #D86F3C; }
    .flux-card--plages { --flux-color: #8FC7DA; }
    .flux-card--parkings { --flux-color: #4CAF50; }
    .flux-card--services { --flux-color: #9C6FD8; }
    .flux-card--events { --flux-color: #F0C040; }
    .flux-card--meteo { --flux-color: #40B0F0; }

    .flux-card__header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 16px;
    }

    .flux-card__icon {
      width: 46px;
      height: 46px;
      border-radius: 11px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: rgba(255,255,255,0.05);
      border: 1px solid rgba(255,255,255,0.08);
      font-size: 1.35rem;
    }

    .flux-card__status {
      display: flex;
      align-items: center;
      gap: 6px;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
    }

    .status-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
    }

    .status-dot--ok { background: #4CAF50; box-shadow: 0 0 7px rgba(76,175,80,0.7); }
    .status-dot--warn { background: #F0C040; box-shadow: 0 0 7px rgba(240,192,64,0.7); }
    .status-dot--alert { background: #D86F3C; box-shadow: 0 0 7px rgba(216,111,60,0.7); animation: blinkDot 1.5s infinite; }

    .status-ok { color: #4CAF50; }
    .status-warn { color: #F0C040; }
    .status-alert { color: #D86F3C; }

    .flux-card__title {
      font-size: 1rem;
      font-weight: 700;
      color: #FAF6EC;
      margin-bottom: 8px;
    }

    .flux-card__desc {
      font-size: 0.84rem;
      color: rgba(250,246,236,0.52);
      line-height: 1.65;
      margin-bottom: 20px;
    }

    .flux-card__meter { display: flex; flex-direction: column; gap: 6px; }

    .meter-bar {
      height: 5px;
      background: rgba(255,255,255,0.07);
      border-radius: 100px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      border-radius: 100px;
      background: var(--flux-color, #1F6F8B);
      width: var(--fill, 50%);
      transition: width 1.8s ease;
    }

    .meter-labels {
      display: flex;
      justify-content: space-between;
      font-size: 0.67rem;
      color: rgba(250,246,236,0.32);
    }

    /* ══ PROBLÈMES & SOLUTIONS ══ */
    .problemes-solutions {
      padding: 110px 0;
      background: #FAF6EC;
      position: relative;
    }

    .problemes-solutions::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 1px;
      background: linear-gradient(90deg, transparent, rgba(11,31,51,0.1), transparent);
    }

    .problems-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 24px;
      margin-top: 60px;
    }

    .problem-item {
      background: #fff;
      border-radius: 20px;
      padding: 34px;
      border: 1px solid rgba(11,31,51,0.07);
      box-shadow: 0 4px 24px rgba(11,31,51,0.05);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
    }

    .problem-item::before {
      content: '';
      position: absolute;
      top: 0; left: 0;
      width: 4px;
      height: 100%;
      background: linear-gradient(180deg, #D86F3C, #1F6F8B);
      opacity: 0;
      transition: opacity 0.3s ease;
    }

    .problem-item:hover {
      transform: translateY(-5px);
      box-shadow: 0 16px 52px rgba(11,31,51,0.11);
    }

    .problem-item:hover::before { opacity: 1; }

    .problem-icon {
      width: 50px;
      height: 50px;
      border-radius: 13px;
      background: rgba(216,111,60,0.07);
      border: 1px solid rgba(216,111,60,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 18px;
      font-size: 1.4rem;
    }

    .problem-item__content h3 {
      font-size: 1.05rem;
      font-weight: 800;
      color: #0B1F33;
      margin-bottom: 10px;
    }

    .problem-desc {
      font-size: 0.87rem;
      color: #5a6a7a;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .solution-arrow {
      font-size: 1.3rem;
      color: #1F6F8B;
      margin-bottom: 12px;
      font-weight: 700;
    }

    .solution-desc {
      font-size: 0.87rem;
      color: #1F6F8B;
      line-height: 1.7;
      font-weight: 500;
      padding: 14px 18px;
      background: rgba(31,111,139,0.06);
      border-radius: 11px;
      border-left: 3px solid #1F6F8B;
    }

    /* ══ CAS D'USAGE ══ */
    .cas-usage {
      padding: 110px 0;
      background: #0B1F33;
      position: relative;
      overflow: hidden;
    }

    .cas-usage::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 70% 50% at 50% 50%, rgba(31,111,139,0.1) 0%, transparent 70%);
      pointer-events: none;
    }

    .cas-usage-list {
      display: flex;
      flex-direction: column;
      gap: 24px;
      margin-top: 60px;
    }

    .cas-item {
      display: grid;
      grid-template-columns: 80px 1fr;
      gap: 28px;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(143,199,218,0.1);
      border-radius: 22px;
      padding: 38px;
      transition: all 0.35s ease;
    }

    .cas-item:hover {
      background: rgba(31,111,139,0.07);
      border-color: rgba(143,199,218,0.2);
      transform: translateX(5px);
    }

    .cas-item__number {
      font-size: 3.2rem;
      font-weight: 900;
      color: rgba(143,199,218,0.13);
      line-height: 1;
      letter-spacing: -0.04em;
      align-self: flex-start;
      padding-top: 4px;
    }

    .cas-tag {
      display: inline-block;
      font-size: 0.68rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: #D86F3C;
      background: rgba(216,111,60,0.1);
      border: 1px solid rgba(216,111,60,0.2);
      padding: 4px 13px;
      border-radius: 100px;
      margin-bottom: 10px;
    }

    .cas-item__context { margin-bottom: 24px; }

    .cas-item__content h3 {
      font-size: 1.18rem;
      font-weight: 800;
      color: #FAF6EC;
      margin: 0;
    }

    .cas-item__scenario {
      display: grid;
      grid-template-columns: 1fr auto 1fr;
      gap: 20px;
      align-items: start;
    }

    .scenario-before, .scenario-after {
      padding: 20px;
      border-radius: 13px;
    }

    .scenario-before {
      background: rgba(216,111,60,0.06);
      border: 1px solid rgba(216,111,60,0.14);
    }

    .scenario-after {
      background: rgba(31,111,139,0.08);
      border: 1px solid rgba(143,199,218,0.18);
    }

    .scenario-label {
      display: block;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      color: rgba(216,111,60,0.8);
      margin-bottom: 10px;
    }

    .scenario-label--after { color: #8FC7DA; }

    .scenario-before p, .scenario-after p {
      font-size: 0.86rem;
      color: rgba(250,246,236,0.62);
      line-height: 1.7;
      margin: 0;
    }

    .scenario-after p { color: rgba(250,246,236,0.75); }

    .scenario-divider {
      display: flex;
      align-items: center;
      justify-content: center;
      padding-top: 20px;
    }

    .divider-icon {
      font-size: 1.5rem;
      color: #1F6F8B;
      opacity: 0.55;
    }

    /* ══ PUBLICS CIBLÉS ══ */
    .publics-cibles {
      padding: 110px 0;
      background: #F5F0E8;
      position: relative;
    }

    .publics-grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 22px;
      margin-top: 60px;
    }

    .public-card {
      background: #fff;
      border-radius: 20px;
      padding: 30px;
      border: 1px solid rgba(11,31,51,0.07);
      box-shadow: 0 4px 20px rgba(11,31,51,0.05);
      transition: all 0.35s ease;
      position: relative;
      overflow: hidden;
      display: flex;
      flex-direction: column;
    }

    .public-card::after {
      content: '';
      position: absolute;
      bottom: 0; left: 0; right: 0;
      height: 3px;
      background: linear-gradient(90deg, #1F6F8B, #8FC7DA);
      transform: scaleX(0);
      transition: transform 0.35s ease;
    }

    .public-card:hover {
      transform: translateY(-6px);
      box-shadow: 0 20px 52px rgba(11,31,51,0.12);
    }

    .public-card:hover::after { transform: scaleX(1); }

    .public-card__icon {
      width: 58px;
      height: 58px;
      border-radius: 15px;
      background: rgba(31,111,139,0.06);
      border: 1px solid rgba(31,111,139,0.14);
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 20px;
      font-size: 1.6rem;
    }

    .public-card__content h3 {
      font-size: 1.02rem;
      font-weight: 800;
      color: #0B1F33;
      margin-bottom: 10px;
    }

    .public-card__desc {
      font-size: 0.84rem;
      color: #5a6a7a;
      line-height: 1.7;
      margin-bottom: 18px;
    }

    .public-card__benefits {
      list-style: none;
      padding: 0;
      margin: 0 0 20px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      flex: 1;
    }

    .public-card__benefits li {
      font-size: 0.82rem;
      color: #2C4A5A;
      padding-left: 16px;
      position: relative;
      line-height: 1.45;
    }

    .public-card__benefits li::before {
      content: '◦';
      position: absolute;
      left: 0;
      color: #1F6F8B;
    }

    .tag-badge {
      display: inline-block;
      font-size: 0.67rem;
      font-weight: 700;
      letter-spacing: 0.09em;
      text-transform: uppercase;
      color: #1F6F8B;
      background: rgba(31,111,139,0.08);
      border: 1px solid rgba(31,111,139,0.18);
      padding: 4px 11px;
      border-radius: 100px;
    }

    /* ══ ENJEUX ENVIRONNEMENT ══ */
    .enjeux-environnement {
      padding: 110px 0;
      background: linear-gradient(160deg, #071524 0%, #0B1F33 50%, #0d2a42 100%);
      position: relative;
      overflow: hidden;
    }

    .enjeux-environnement::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse 60% 60% at 80% 50%, rgba(31,111,139,0.14) 0%, transparent 60%);
      pointer-events: none;
    }

    .enjeux-inner {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 72px;
      align-items: center;
    }

    .enjeux-list {
      display: flex;
      flex-direction: column;
      gap: 30px;
      margin-top: 40px;
    }

    .enjeu-item {
      display: flex;
      gap: 18px;
      align-items: flex-start;
    }

    .enjeu-item__icon {
      flex-shrink: 0;
      width: 46px;
      height: 46px;
      border-radius: 11px;
      background: rgba(31,111,139,0.14);
      border: 1px solid rgba(31,111,139,0.28);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
    }

    .enjeu-item__text h4 {
      font-size: 0.97rem;
      font-weight: 700;
      color: #FAF6EC;
      margin-bottom: 6px;
    }

    .enjeu-item__text p {
      font-size: 0.84rem;
      color: rgba(250,246,236,0.58);
      line-height: 1.7;
      margin: 0;
    }

    .enjeux-visual { position: relative; }

    .enjeux-photo-container {
      position: relative;
      width: 100%;
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 24px 72px rgba(0,0,0,0.5);
    }

    .enjeux-photo-container img {
      width: 100%;
      height: 380px;
      object-fit: cover;
      display: block;
    }

    .enjeux-photo-overlay {
      position: absolute;
      inset: 0;
      background: linear-gradient(135deg, rgba(11,31,51,0.6) 0%, rgba(31,111,139,0.3) 100%);
    }

    .enjeux-photo-badge {
      position: absolute;
      bottom: 20px;
      left: 20px;
      right: 20px;
      background: rgba(11,31,51,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(143,199,218,0.2);
      border-radius: 14px;
      padding: 16px 20px;
    }

    .enjeux-photo-badge__title {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8FC7DA;
      margin-bottom: 6px;
    }

    .enjeux-photo-badge__text {
      font-size: 0.84rem;
      color: rgba(250,246,236,0.7);
      line-height: 1.5;
      margin: 0;
    }

    /* Fallback map container */
    .enjeux-map-container {
      position: relative;
      width: 100%;
      aspect-ratio: 1;
      max-width: 440px;
      margin: 0 auto;
    }

    .enjeux-map-bg {
      position: absolute;
      inset: 0;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(31,111,139,0.14) 0%, rgba(11,31,51,0.5) 70%);
      border: 1px solid rgba(143,199,218,0.14);
    }

    .enjeux-map-bg::before {
      content: '';
      position: absolute;
      inset: 15%;
      border-radius: 50%;
      border: 1px solid rgba(143,199,218,0.09);
    }

    .enjeux-map-bg::after {
      content: '';
      position: absolute;
      inset: 30%;
      border-radius: 50%;
      border: 1px solid rgba(143,199,218,0.07);
    }

    .enjeux-map-overlay { position: absolute; inset: 0; }

    .map-point {
      position: absolute;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .map-point--1 { top: 20%; left: 15%; }
    .map-point--2 { top: 35%; right: 10%; }
    .map-point--3 { bottom: 30%; left: 20%; }
    .map-point--4 { bottom: 20%; right: 20%; }

    .map-point__dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: #8FC7DA;
      border: 2px solid rgba(143,199,218,0.4);
      flex-shrink: 0;
    }

    .map-point__dot--active {
      background: #D86F3C;
      border-color: rgba(216,111,60,0.4);
      box-shadow: 0 0 14px rgba(216,111,60,0.7);
      animation: pulsePoint 2s ease-in-out infinite;
    }

    @keyframes pulsePoint {
      0%, 100% { box-shadow: 0 0 14px rgba(216,111,60,0.7); }
      50% { box-shadow: 0 0 28px rgba(216,111,60,1); }
    }

    .map-point__label {
      font-size: 0.7rem;
      color: rgba(250,246,236,0.58);
      white-space: nowrap;
      font-weight: 500;
    }

    /* ══ GALERIE LOCALE PORTO FLOW ══ */
    .galerie-locale {
      padding: 100px 0;
      background: #F5F0E8;
      position: relative;
    }

    .galerie-locale::before {
      content: '';
      position: absolute;
      top: 0; left: 0; right: 0;
      height: 4px;
      background: linear-gradient(90deg, #1F6F8B 0%, #D86F3C 50%, #1F6F8B 100%);
    }

    .galerie-locale__notice {
      display: flex;
      align-items: flex-start;
      gap: 14px;
      background: rgba(31,111,139,0.06);
      border: 1px solid rgba(31,111,139,0.18);
      border-radius: 14px;
      padding: 18px 22px;
      margin-top: 36px;
      margin-bottom: 40px;
    }

    .galerie-locale__notice-icon {
      flex-shrink: 0;
      font-size: 1.3rem;
      margin-top: 2px;
    }

    .galerie-locale__notice p {
      font-size: 0.84rem;
      color: #2C4A5A;
      line-height: 1.7;
      margin: 0;
    }

    .galerie-locale__notice strong {
      color: #1F6F8B;
    }

    /* Formulaire ajout photo */
    .galerie-add-form {
      background: #fff;
      border-radius: 20px;
      padding: 36px 40px;
      border: 1px solid rgba(11,31,51,0.08);
      box-shadow: 0 4px 24px rgba(11,31,51,0.06);
      margin-bottom: 48px;
    }

    .galerie-add-form__title {
      font-size: 1.05rem;
      font-weight: 800;
      color: #0B1F33;
      margin-bottom: 28px;
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .galerie-add-form__title-icon {
      width: 36px;
      height: 36px;
      border-radius: 9px;
      background: rgba(31,111,139,0.08);
      border: 1px solid rgba(31,111,139,0.18);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
    }

    .galerie-form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 20px;
      margin-bottom: 20px;
    }

    .galerie-form-group {
      display: flex;
      flex-direction: column;
      gap: 7px;
    }

    .galerie-form-group--full {
      grid-column: span 2;
    }

    .galerie-form-group label {
      font-size: 0.78rem;
      font-weight: 700;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: #2C4A5A;
    }

    .galerie-form-group input[type="text"],
    .galerie-form-group input[type="url"],
    .galerie-form-group select {
      padding: 11px 16px;
      border: 1.5px solid rgba(11,31,51,0.14);
      border-radius: 10px;
      font-size: 0.9rem;
      color: #0B1F33;
      background: #FAF6EC;
      transition: border-color 0.25s ease, box-shadow 0.25s ease;
      outline: none;
      font-family: inherit;
    }

    .galerie-form-group input[type="text"]:focus,
    .galerie-form-group input[type="url"]:focus,
    .galerie-form-group select:focus {
      border-color: #1F6F8B;
      box-shadow: 0 0 0 3px rgba(31,111,139,0.1);
    }

    .galerie-form-group input[type="file"] {
      padding: 10px 14px;
      border: 2px dashed rgba(31,111,139,0.3);
      border-radius: 10px;
      font-size: 0.87rem;
      color: #2C4A5A;
      background: rgba(31,111,139,0.03);
      cursor: pointer;
      transition: border-color 0.25s ease, background 0.25s ease;
      font-family: inherit;
    }

    .galerie-form-group input[type="file"]:hover {
      border-color: #1F6F8B;
      background: rgba(31,111,139,0.06);
    }

    .galerie-form-separator {
      display: flex;
      align-items: center;
      gap: 14px;
      margin: 4px 0;
      grid-column: span 2;
    }

    .galerie-form-separator span {
      font-size: 0.75rem;
      font-weight: 700;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(11,31,51,0.35);
      white-space: nowrap;
    }

    .galerie-form-separator::before,
    .galerie-form-separator::after {
      content: '';
      flex: 1;
      height: 1px;
      background: rgba(11,31,51,0.1);
    }

    .galerie-form-actions {
      display: flex;
      align-items: center;
      gap: 16px;
      flex-wrap: wrap;
      margin-top: 8px;
    }

    .galerie-form-error {
      font-size: 0.82rem;
      color: #c0522a;
      background: rgba(216,111,60,0.07);
      border: 1px solid rgba(216,111,60,0.2);
      border-radius: 8px;
      padding: 8px 14px;
      display: none;
    }

    .galerie-form-error.visible { display: block; }

    /* Grille galerie locale */
    .galerie-locale__grid {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 18px;
      min-height: 80px;
    }

    .galerie-locale__empty {
      grid-column: span 3;
      text-align: center;
      padding: 52px 20px;
      color: rgba(11,31,51,0.35);
      font-size: 0.9rem;
      border: 2px dashed rgba(11,31,51,0.1);
      border-radius: 16px;
    }

    .galerie-locale__empty-icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: 12px;
      opacity: 0.4;
    }

    .galerie-photo-card {
      background: #fff;
      border-radius: 16px;
      overflow: hidden;
      border: 1px solid rgba(11,31,51,0.07);
      box-shadow: 0 4px 16px rgba(11,31,51,0.06);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      position: relative;
    }

    .galerie-photo-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 14px 40px rgba(11,31,51,0.12);
    }

    .galerie-photo-card__img-wrap {
      width: 100%;
      height: 180px;
      overflow: hidden;
      background: linear-gradient(135deg, #e8e0d0, #d8d0c0);
      position: relative;
    }

    .galerie-photo-card__img {
